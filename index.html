<html lang="it">

<head>

  <title>PumaFly Check-in</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #0a1f44, #1e3c72);
      color: white;
      text-align: center;
      padding: 15px;
      margin: 0;
    }

    .container {
      background: rgba(255, 255, 255, 0.95);
      color: #333;
      width: 90%;
      max-width: 400px;
      margin: auto;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(8px);
    }

    h1 {
      color: #0a1f44;
      margin-bottom: 10px;
      font-size: 22px;
    }

    .logo {
      font-size: 26px;
      font-weight: bold;
      color: #0a1f44;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 5px;
      border: 1px solid #ccc;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      margin-top: 10px;
      padding: 14px;
      background: #0a1f44;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #142e66;
    }

    .boarding-pass {
      margin-top: 20px;
      padding: 15px;
      background: #f4f4f4;
      border-radius: 8px;
      display: none;
    }

    .boarding-pass h3 {
      margin: 10px 0;
      color: #0a1f44;
    }
  </style>
</head>

  <div class="container">
    <div class="logo">✈️ PumaFly</div>
    <h1>Check-in Online</h1>

    <input type="text" id="name" placeholder="Nome e Cognome">
    <input type="text" id="destination" placeholder="Destinazione">
    <input type="text" id="flight" placeholder="Numero Prenotazione">

    <button onclick="checkIn()">Conferma Check-in</button>

    <div class="boarding-pass" id="boardingPass">
      <h3>Boarding Pass</h3>
      <p><strong>Passeggero:</strong> <span id="bpName"></span></p>
      <p><strong>Destinazione:</strong> <span id="bpDestination"></span></p>
      <p><strong>N. Prenotazione:</strong> <span id="bpFlight"></span></p>
      <p><strong>Gate:</strong> TBD</p>
    </div>
  </div>
